# Series 3: Stream Scaling - 1 Stream
# Purpose: Establish single-stream baseline for concurrency scaling comparison
# Variable: Streams (1)
# Fixed: Nodes=1, SF=50, 4 vCPU/stream, ~24GB usable/stream
# Systems: All 5 (Exasol, ClickHouse, Trino, StarRocks, DuckDB)
project_id: "extscal_streams_1"
title: "Streamlined Scalability - Stream Scaling (1 Stream)"
author: "Benchmark Team"

execution:
  parallel: true
  sequential: true
  max_workers: 5

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM (4 vCPU/stream)
      disk:
        type: "local"
      label: "extscal-exa-s1"
    clickhouse:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM (4 vCPU/stream)
      disk:
        type: "local"
      label: "extscal-ch-s1"
    trino:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM (4 vCPU/stream)
      disk:
        type: "local"
      label: "extscal-trino-s1"
    starrocks:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM (4 vCPU/stream)
      disk:
        type: "local"
      label: "extscal-sr-s1"
    duckdb:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM (4 vCPU/stream)
      disk:
        type: "local"
      label: "extscal-duck-s1"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  # Exasol - single node, 1 stream (~24GB usable)
  - name: "exasol"
    kind: "exasol"
    version: "2025.2.0"
    setup:
      method: "installer"
      node_count: 1
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 24000  # ~75% of 32GB
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  # ClickHouse - single node, 1 stream
  - name: "clickhouse"
    kind: "clickhouse"
    version: "25.10.2.65"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "24g"
        max_threads: "4"
        # 32GB instance, 1 stream: full 24GB/query budget, grace_hash spills to disk
        max_memory_usage: "24000000000"
        max_bytes_before_external_group_by: "8000000000"
        max_bytes_before_external_sort: "8000000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "16000000000"

  # Trino - single node, 1 stream (no S3 needed)
  - name: "trino"
    kind: "trino"
    version: "479"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      host: "$TRINO_PUBLIC_IP"
      port: 8080
      username: "admin"
      catalog: "hive"
      schema: "tpch_views"
      extra:
        # 32GB RAM: heap=25.6GB, safe query memory = 25.6*0.7 = 18GB
        query_max_memory: "18GB"
        query_max_memory_per_node: "18GB"

  # StarRocks - single node, 1 stream
  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.4"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 4
        replication_num: 1

  # DuckDB - embedded single node, 1 stream
  - name: "duckdb"
    kind: "duckdb"
    version: "1.4.4"
    setup:
      method: "native"
      use_additional_disk: true
      data_dir: "/data/duckdb"
      database_path: "/data/duckdb/benchmark.duckdb"
      extra:
        memory_limit: "24GB"  # ~75% of 32GB
        threads: 4

workload:
  name: "tpch"
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: "csv"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 1
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
