# Series 1: Node Scaling - 8 Nodes (128GB total)
# Purpose: Measure 8-node cluster performance
# Variable: Nodes (8)
# Fixed: SF=100, Streams=4, 128GB total RAM, 16 total vCPU
# Systems: Exasol, ClickHouse, Trino, StarRocks (4 cluster-capable systems)
project_id: "extscal_nodes_8"
title: "Streamlined Scalability - Node Scaling (8 Nodes)"
author: "Benchmark Team"

execution:
  parallel: true
  sequential: true
  max_workers: 2

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.large"  # 2 vCPUs, 16GB RAM per node (128GB total, 16 vCPU)
      disk:
        type: "local"
      label: "extscal-exa-n8"
    clickhouse:
      instance_type: "r6id.large"  # 2 vCPUs, 16GB RAM per node (128GB total, 16 vCPU)
      disk:
        type: "local"
      label: "extscal-ch-n8"
    trino:
      instance_type: "r6id.large"  # 2 vCPUs, 16GB RAM per node (128GB total, 16 vCPU)
      disk:
        type: "local"
      label: "extscal-trino-n8"
    starrocks:
      instance_type: "r6id.large"  # 2 vCPUs, 16GB RAM per node (128GB total, 16 vCPU)
      disk:
        type: "local"
      label: "extscal-sr-n8"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  # Exasol - 8-node cluster (128GB total)
  - name: "exasol"
    kind: "exasol"
    version: "2025.2.0"
    setup:
      method: "installer"
      node_count: 8
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 96000  # 12GB x 8 nodes = 96GB cluster memory (~75% of 128GB)
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"
          - "-replicationborder=550000"  # SF50 * 11000

  # ClickHouse - 8-node sharded cluster (128GB total)
  - name: "clickhouse"
    kind: "clickhouse"
    version: "26.1.3.52"
    setup:
      method: "native"
      node_count: 8
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "12g"  # Per-node limit (~75% of 16GB)
        max_threads: "2"
        # 16GB/node, 4 streams: allow 3GB/query/node, grace_hash spills to disk
        max_memory_usage: "3000000000"
        max_bytes_before_external_group_by: "1000000000"
        max_bytes_before_external_sort: "1000000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "2000000000"

  # Trino - 8-node cluster (1 coordinator + 7 workers, 128GB total)
  - name: "trino"
    kind: "trino"
    version: "479"
    setup:
      method: "native"
      node_count: 8
      use_additional_disk: true
      host: "$TRINO_PUBLIC_IP"
      port: 8080
      username: "admin"
      catalog: "hive"
      schema: "tpch_views"
      storage:
        type: "s3"
        bucket: "benchkit-extscalability-trino-eu-west-1"
        region: "eu-west-1"
      extra:
        # Per-node: 16GB RAM, heap=12.8GB, safe query memory = 12.8*0.7 = 9GB
        query_max_memory: "72GB"        # Total across cluster (9GB x 8 nodes)
        query_max_memory_per_node: "9GB"

  # StarRocks - 8-node cluster (1 FE + 7 BE, 128GB total)
  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.6"
    setup:
      method: "native"
      node_count: 8
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 32  # 4 buckets per node for even distribution
        replication_num: 1

workload:
  name: "tpch"
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
