# Series 2: Scale Factor Scaling - SF100
# Purpose: Measure data scalability on single node with largest dataset
# Variable: SF (100)
# Fixed: Nodes=1, Streams=4
# Systems: All 5 (Exasol, ClickHouse, Trino, StarRocks, DuckDB)
project_id: "extscal_sf_100"
title: "Streamlined Scalability - Scale Factor 100 (Single Node)"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 5

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.4xlarge"  # 16 vCPUs, 128GB RAM
      disk:
        type: "local"
      label: "extscal-exa-sf100"
    clickhouse:
      instance_type: "r6id.4xlarge"  # 16 vCPUs, 128GB RAM
      disk:
        type: "local"
      label: "extscal-ch-sf100"
    trino:
      instance_type: "r6id.4xlarge"  # 16 vCPUs, 128GB RAM
      disk:
        type: "local"
      label: "extscal-trino-sf100"
    starrocks:
      instance_type: "r6id.4xlarge"  # 16 vCPUs, 128GB RAM
      disk:
        type: "local"
      label: "extscal-sr-sf100"
    duckdb:
      instance_type: "r6id.4xlarge"  # 16 vCPUs, 128GB RAM
      disk:
        type: "local"
      label: "extscal-duck-sf100"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  # Exasol - single node, 128GB instance
  - name: "exasol"
    kind: "exasol"
    version: "2025.2.0"
    setup:
      method: "installer"
      node_count: 1
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 96000  # ~75% of 128GB
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  # ClickHouse - single node, 128GB instance
  - name: "clickhouse"
    kind: "clickhouse"
    version: "26.1.3.52"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "96g"
        max_threads: "16"
        # 128GB instance, 4 streams: allow 30GB/query, grace_hash spills to disk
        max_memory_usage: "30000000000"
        max_bytes_before_external_group_by: "10000000000"
        max_bytes_before_external_sort: "10000000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "20000000000"

  # Trino - single node (no S3 needed for single node)
  - name: "trino"
    kind: "trino"
    version: "479"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      host: "$TRINO_PUBLIC_IP"
      port: 8080
      username: "admin"
      catalog: "hive"
      schema: "tpch_views"
      extra:
        query_max_memory: "96GB"
        # 128GB RAM: heap=102GB, safe query memory = 102*0.7 = 71GB
        query_max_memory_per_node: "71GB"

  # StarRocks - single node
  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.6"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 4
        replication_num: 1

  # DuckDB - embedded single node
  - name: "duckdb"
    kind: "duckdb"
    version: "1.4.4"
    setup:
      method: "native"
      use_additional_disk: true
      data_dir: "/data/duckdb"
      database_path: "/data/duckdb/benchmark.duckdb"
      extra:
        memory_limit: "96GB"  # ~75% of 128GB
        threads: 16

workload:
  name: "tpch"
  scale_factor: 100
  runs_per_query: 5
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
