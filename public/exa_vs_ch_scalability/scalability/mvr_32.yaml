# Minimum Viable Resources - 32GB
# Goal: Show partial ClickHouse failures at moderate constraint
project_id: "scalability_mvr_32"
title: "Minimum Viable Resources - 32GB"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 2

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM
      disk:
        type: "local"
      label: "scalability-exa-mvr32"
    clickhouse:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM
      disk:
        type: "local"
      label: "scalability-ch-mvr32"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "exasol"
    kind: "exasol"
    version: "2025.1.8"
    setup:
      method: "installer"
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 24000  # 24GB for 32GB instance
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  - name: "clickhouse"
    kind: "clickhouse"
    version: "25.10.2.65"
    setup:
      method: "native"
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "24g"
        max_threads: "4"
        # 24GB * 0.8 / 5 streams = ~4GB per query
        max_memory_usage: "4000000000"
        max_bytes_before_external_group_by: "2000000000"
        max_bytes_before_external_sort: "2000000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "1000000000"

workload:
  name: "tpch"
  scale_factor: 30
  runs_per_query: 5
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 5
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
