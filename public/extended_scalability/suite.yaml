name: "Extended Scalability Benchmark"
version: "1.0.0"
description: "Comprehensive scalability testing across node count, data volume, and concurrency"
author: "Exasol Benchmark Team"
license: "MIT"
homepage: "https://github.com/exasol/benchkit"
keywords: ["scalability", "tpc-h", "analytical", "multinode"]

series:
  series_1_nodes:
    name: "Node Scaling"
    description: "Test horizontal scaling with 1-16 nodes"
    enabled: true

  series_2_sf:
    name: "Scale Factor Scaling"
    description: "Test data volume scaling SF25-SF100"
    enabled: true

  series_3_streams_cluster:
    name: "Cluster Stream Scaling"
    description: "Test concurrent query streams on 4-node cluster"
    enabled: false  # Disabled by default (expensive)

  series_4_streams_single:
    name: "Single Node Stream Scaling"
    description: "Test concurrent query streams on single node"
    enabled: true

  series_5_stress:
    name: "Stress Tests"
    description: "Maximum nodes + maximum data/streams"
    enabled: false  # Disabled by default (expensive)

publish:
  title: "Extended Scalability Study Results"
  description: "Comprehensive scalability testing across node count, data volume, and concurrency"


execution:
  mode: sequential
  max_parallel: 1
  continue_on_failure: true
  pause_between: 30

infrastructure:
  cleanup_after_each: true
  cleanup_on_failure: true

timeouts:
  infrastructure: 3600   # 1 hour
  benchmark: 14400       # 4 hours
  cleanup: 900           # 15 minutes

reports:
  index_enabled: true
  index_title: "Extended Scalability Study Results"
  series_reports_enabled: true
