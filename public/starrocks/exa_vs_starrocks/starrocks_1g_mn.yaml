project_id: "starrocks_1g_mn"
title: "StarRocks: TPC-H SF1 (Multi-Node 3, Single-User) - True Distribution"
author: "Benchmark Team"

execution:
  parallel: false
  max_workers: 1

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    starrocks:
      instance_type: "r6id.large"    # 2 vCPUs, 16GB RAM per node (48GB total)
      disk:
        type: "local"
      label: "sr-1g-mn-dist"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.4"
    setup:
      method: "native"
      node_count: 3
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 9     # 3 buckets per node for even distribution
        replication_num: 1  # True distribution (not replication)

workload:
  name: "tpch"
  scale_factor: 1
  runs_per_query: 7
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen"

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
