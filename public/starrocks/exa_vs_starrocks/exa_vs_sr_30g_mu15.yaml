project_id: "starrocks_exa_vs_sr_30g_mu15"
title: "Exasol vs StarRocks: TPC-H SF30 (Single-Node, 15 Streams)"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 2

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.xlarge"   # 4 vCPUs, 32GB RAM, 237GB NVMe
      disk:
        type: "local"
      label: "starrocks-exa-30g-mu15"
    starrocks:
      instance_type: "r6id.xlarge"   # 4 vCPUs, 32GB RAM, 237GB NVMe
      disk:
        type: "local"
      label: "starrocks-sr-30g-mu15"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "exasol"
    kind: "exasol"
    version: "2025.1.8"
    setup:
      method: "installer"
      node_count: 1
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 28000             # ~28GB for SF30
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.4"
    setup:
      method: "native"
      node_count: 1
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""

workload:
  name: "tpch"
  scale_factor: 30
  runs_per_query: 5
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen"
  multiuser:
    enabled: true
    num_streams: 15
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
