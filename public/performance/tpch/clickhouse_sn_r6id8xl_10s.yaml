project_id: perf_tpch_10users_clickhouse_sn_r6id8xl
title: 'Combined benchmark: perf_tpch_10users_clickhouse_sn_r6id8xl'
author: Combined
systems:
- name: clickhouse
  kind: clickhouse
  version: 25.10.2.65
  setup:
    method: preinstalled
    use_additional_disk: true
    data_dir: /data/clickhouse
    host: $CLICKHOUSE_PUBLIC_IP
    port: 8123
    username: default
    password: clickhouse123
    extra:
      memory_limit: 230g
      max_threads: '32'
      max_memory_usage: '200000000000'
      max_bytes_before_external_group_by: '100000000000'
      max_bytes_before_external_sort: '100000000000'
workload:
  name: tpch
  scale_factor: 100
  runs_per_query: 15
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  multiuser:
    enabled: true
    num_streams: 10
    randomize: true
    random_seed: 42
env:
  mode: local
  instances:
    clickhouse:
      instance_type: r6id.8xlarge
report:
  output_path: results/perf_tpch_10users_clickhouse_sn_r6id8xl/reports
  figures_dir: results/perf_tpch_10users_clickhouse_sn_r6id8xl/figures
