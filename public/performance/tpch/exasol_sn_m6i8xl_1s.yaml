project_id: perf_tpch_1user_exasol_sn_m6i8xl
title: 'Combined benchmark: perf_tpch_1user_exasol_sn_m6i8xl'
author: Combined
systems:
- name: exasol_1n
  kind: exasol
  version: 2025.2.0
  setup:
    method: preinstalled
    node_count: 1
    use_additional_disk: true
    c4_version: 4.28.5
    host_addrs: $EXASOL_1N_PRIVATE_IP
    host_external_addrs: $EXASOL_1N_PUBLIC_IP
    image_password: exasol123
    db_password: exasol456
    admin_password: exasol789
    license_file: configs/exasol.license
    db_mem_size: 96000
    db_redundancy: 1
    extra:
      optimizer_mode: analytical
      db_params:
      - -writeTouchInit=1
      - -cacheMonitorLimit=0
      - -maxOverallSlbUsageRatio=0.95
      - -useQueryCache=0
      - -query_log_timeout=0
      - -joinOrderMethod=0
      - -etlCheckCertsDefault=0
workload:
  name: tpch
  scale_factor: 100
  runs_per_query: 5
  warmup_runs: 1
  data_format: csv
  generator: dbgen
env:
  mode: local
  instances:
    exasol_1n:
      instance_type: m6i.8xlarge
report:
  output_path: results/perf_tpch_1user_exasol_sn_m6i8xl/reports
  figures_dir: results/perf_tpch_1user_exasol_sn_m6i8xl/figures
