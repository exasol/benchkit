project_id: perf_tpch_10users_clickhouse_4n_r5d2xl
title: 'Combined benchmark: perf_tpch_10users_clickhouse_4n_r5d2xl'
author: Combined
systems:
- name: clickhouse
  kind: clickhouse
  version: 25.10.2.65
  setup:
    method: preinstalled
    node_count: 4
    use_additional_disk: true
    data_dir: /data/clickhouse
    host: $CLICKHOUSE_PUBLIC_IP
    port: 8123
    username: default
    password: clickhouse123
    extra:
      memory_limit: 50g
      max_threads: '8'
      max_memory_usage: '4000000000'
      max_bytes_before_external_group_by: '2000000000'
      max_bytes_before_external_sort: '2000000000'
      join_algorithm: grace_hash
      max_bytes_in_join: '1000000000'
workload:
  name: tpch
  scale_factor: 100
  runs_per_query: 15
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  system_variants:
    clickhouse: tuned
  multiuser:
    enabled: true
    num_streams: 10
    randomize: true
    random_seed: 42
env:
  mode: local
  instances:
    clickhouse:
      instance_type: r5d.2xlarge
report:
  output_path: results/perf_tpch_10users_clickhouse_4n_r5d2xl/reports
  figures_dir: results/perf_tpch_10users_clickhouse_4n_r5d2xl/figures
