project_id: perf_tpch_5users_exasol_4n_r5d8xl
title: 'Combined benchmark: perf_tpch_5users_exasol_4n_r5d8xl'
author: Combined
systems:
- name: exasol
  kind: exasol
  version: 2025.1.8
  setup:
    method: preinstalled
    node_count: 4
    use_additional_disk: true
    c4_version: 4.28.5
    host_addrs: $EXASOL_PRIVATE_IP
    host_external_addrs: $EXASOL_PUBLIC_IP
    image_password: exasol123
    db_password: exasol456
    admin_password: exasol789
    license_file: configs/exasol.license
    db_mem_size: 220000
    extra:
      optimizer_mode: analytical
      db_params:
      - -writeTouchInit=1
      - -cacheMonitorLimit=0
      - -maxOverallSlbUsageRatio=0.95
      - -useQueryCache=0
      - -query_log_timeout=0
      - -joinOrderMethod=0
      - -etlCheckCertsDefault=0
workload:
  name: tpch
  scale_factor: 100
  runs_per_query: 15
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  system_variants:
    clickhouse: tuned
  multiuser:
    enabled: true
    num_streams: 5
    randomize: true
    random_seed: 42
env:
  mode: local
  instances:
    exasol:
      instance_type: r5d.8xlarge
report:
  output_path: results/perf_tpch_5users_exasol_4n_r5d8xl/reports
  figures_dir: results/perf_tpch_5users_exasol_4n_r5d8xl/figures
