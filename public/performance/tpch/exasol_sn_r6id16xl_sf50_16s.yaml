project_id: perf_tpch_exasol_sn_r6id16xl_sf50_16s
title: 'Combined benchmark: perf_tpch_exasol_sn_r6id16xl_sf50_16s'
author: Combined
systems:
- name: exasol
  kind: exasol
  version: 2025.2.0
  setup:
    method: preinstalled
    extra:
      optimizer_mode: analytical
      db_params:
      - -writeTouchInit=1
      - -cacheMonitorLimit=0
      - -maxOverallSlbUsageRatio=0.95
      - -useQueryCache=0
      - -query_log_timeout=0
      - -joinOrderMethod=0
      - -etlCheckCertsDefault=0
workload:
  name: tpch
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  multiuser:
    enabled: true
    num_streams: 16
    randomize: true
    random_seed: 42
env:
  mode: aws
  instances:
    exasol:
      instance_type: r6id.16xlarge
