project_id: perf_tpch_duckdb_sn_r6id8xl_sf50_8s
title: 'Combined benchmark: perf_tpch_duckdb_sn_r6id8xl_sf50_8s'
author: Combined
systems:
- name: duckdb
  kind: duckdb
  version: 1.4.4
  setup:
    method: preinstalled
    extra:
      memory_limit: 192GB
      threads: 32
workload:
  name: tpch
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: tbl
  generator: dbgen
  multiuser:
    enabled: true
    num_streams: 8
    randomize: true
    random_seed: 42
env:
  mode: aws
  instances:
    duckdb:
      instance_type: r6id.8xlarge
