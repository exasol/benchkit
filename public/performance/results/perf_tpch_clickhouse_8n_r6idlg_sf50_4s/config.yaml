project_id: perf_tpch_clickhouse_8n_r6idlg_sf50_4s
title: 'Combined benchmark: perf_tpch_clickhouse_8n_r6idlg_sf50_4s'
author: Combined
systems:
- name: clickhouse
  kind: clickhouse
  version: 26.1.3.52
  setup:
    method: preinstalled
    node_count: 8
    extra:
      memory_limit: 12g
      max_threads: '2'
      max_memory_usage: '3000000000'
      max_bytes_before_external_group_by: '1000000000'
      max_bytes_before_external_sort: '1000000000'
      join_algorithm: grace_hash
      max_bytes_in_join: '2000000000'
workload:
  name: tpch
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: tbl
  generator: dbgen
  system_variants:
    clickhouse: tuned
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42
env:
  mode: aws
  instances:
    clickhouse:
      instance_type: r6id.large
