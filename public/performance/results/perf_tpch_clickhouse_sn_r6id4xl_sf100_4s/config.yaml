project_id: perf_tpch_clickhouse_sn_r6id4xl_sf100_4s
title: 'Combined benchmark: perf_tpch_clickhouse_sn_r6id4xl_sf100_4s'
author: Combined
systems:
- name: clickhouse
  kind: clickhouse
  version: 26.1.3.52
  setup:
    method: preinstalled
    extra:
      memory_limit: 96g
      max_threads: '16'
      max_memory_usage: '30000000000'
      max_bytes_before_external_group_by: '10000000000'
      max_bytes_before_external_sort: '10000000000'
      join_algorithm: grace_hash
      max_bytes_in_join: '20000000000'
workload:
  name: tpch
  scale_factor: 100
  runs_per_query: 5
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  system_variants:
    clickhouse: tuned
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42
env:
  mode: aws
  instances:
    clickhouse:
      instance_type: r6id.4xlarge
