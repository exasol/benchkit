project_id: perf_tpch_duckdb_sn_r6id4xl_sf50_4s
title: 'Combined benchmark: perf_tpch_duckdb_sn_r6id4xl_sf50_4s'
author: Combined
systems:
- name: duckdb
  kind: duckdb
  version: 1.4.4
  setup:
    method: preinstalled
    extra:
      memory_limit: 96GB
      threads: 16
workload:
  name: tpch
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: csv
  generator: dbgen
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42
env:
  mode: aws
  instances:
    duckdb:
      instance_type: r6id.4xlarge
