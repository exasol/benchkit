name: "Exasol 1N vs 2N: Scale Factor Scaling with Replication Border"
version: "1.0.0"
description: >
  Test whether Exasol's replication border benefit (SF*11000, replicating supplier only)
  holds across scale factors SF50 through SF1000. Each config runs 1-node vs 2-node
  with the 2-node system using -replicationborder=SF*11000.
author: "Benchmark Team"
keywords: ["replication", "scale-factor", "tpc-h", "1n-vs-2n"]

# SF100 can reuse existing results: copy from results/exasol_1n_vs_2n_rep/
# SF50 has no matching single-user 1n vs 2n results, must run
#
# Supplier rows at each SF (all below border = replicated on 2n):
#   SF50:   500K   < 550K border
#   SF100:  1M     < 1.1M border
#   SF300:  3M     < 3.3M border
#   SF500:  5M     < 5.5M border
#   SF1000: 10M    < 11M border

series:
  sf_scaling:
    name: "Scale Factor Scaling (SF50-SF1000)"
    description: "1N vs 2N with replication border SF*11000 across scale factors"
    enabled: true
  node_scaling:
    name: "Node Scaling (1N-10N, r6id.4xlarge)"
    description: "Horizontal scaling with constant per-node data (~SF100/node) on r6id.4xlarge"
    enabled: true

publish:
  title: "Exasol Scaling Study"
  description: "SF scaling (1N vs 2N) and node scaling (1N-10N on r6id.4xlarge)"


execution:
  mode: sequential
  max_parallel: 1
  continue_on_failure: true
  pause_between: 30

infrastructure:
  cleanup_after_each: true
  cleanup_on_failure: true

timeouts:
  infrastructure: 3600
  benchmark: 86400   # 24h - SF1000 may take very long
  cleanup: 900

reports:
  index_enabled: true
  index_title: "Scale Factor Scaling with Replication Border"
  series_reports_enabled: true
