# Exasol Node Scaling: 4 Nodes, TPC-H SF400 on r6id.4xlarge
# Hardware: r6id.4xlarge (16 vCPU, 128GB RAM, 1x NVMe SSD)
# Replication border: 4400000 (SF400 * 11000) - replicates supplier (4M rows)

project_id: "exa_node_scaling_4n"
title: "Exasol Node Scaling: 4N SF400"
author: "Benchmark Team"

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.4xlarge"  # 16 vCPU, 128GB RAM, 1x NVMe SSD
      label: "exa-node-scaling-4n"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "exasol"
    kind: "exasol"
    version: "2025.2.0"
    setup:
      method: "installer"
      node_count: 4
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 384000
      db_redundancy: 1
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"
          - "-replicationborder=4400000"

workload:
  name: "tpch"
  scale_factor: 400
  runs_per_query: 5
  warmup_runs: 1
  data_format: "tbl"
  generator: "dbgen-pipe"

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
