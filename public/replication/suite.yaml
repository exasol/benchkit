name: "Replication Border Comparison"
version: "1.0.0"
description: "Compare Exasol replication border SF*11000 vs SF*210000 across 2, 4, 8 nodes"
author: "Exasol Benchmark Team"
keywords: ["replication", "scalability", "tpc-h", "multinode"]

series:
  rep_11k:
    name: "Replication Border SF*11000"
    description: "Replicates supplier only (550K border at SF50)"
    enabled: true

  rep_210k:
    name: "Replication Border SF*210000"
    description: "Replicates supplier + customer + part (10.5M border at SF50)"
    enabled: true

publish:
  title: "Replication Border Comparison Results"
  description: "Compare Exasol replication border SF*11000 vs SF*210000 across 2, 4, 8 nodes"


execution:
  mode: sequential
  max_parallel: 1
  continue_on_failure: true
  pause_between: 30

infrastructure:
  cleanup_after_each: true
  cleanup_on_failure: true

timeouts:
  infrastructure: 3600
  benchmark: 14400
  cleanup: 900

reports:
  index_enabled: true
  index_title: "Replication Border Comparison Results"
  series_reports_enabled: true
