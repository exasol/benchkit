# System test: ClickHouse Docker with Parquet data format
# Validates: tpchgen-cli parquet generation, parquet loading code path
# Expected time: ~3 minutes

project_id: "docker_sys_ch_parquet"
title: "Docker System Test - ClickHouse Parquet Loading"
author: "Benchmark Team"

env:
  mode: "local"

systems:
  - name: "clickhouse"
    kind: "clickhouse"
    version: "24.8"
    setup:
      method: "docker"
      host: "localhost"
      port: 8123
      username: "default"
      password: ""
      data_dir: "/tmp/benchkit_docker_test/docker_sys_ch_parquet/clickhouse"

workload:
  name: "tpch"
  scale_factor: 1
  runs_per_query: 1
  warmup_runs: 0
  data_format: "parquet"
  generator: "dbgen"
  queries:
    include: ["Q01", "Q06"]

report:
  show_bar_chart: true
