# Series 3: Stream Scaling (Cluster) - 4 Streams
# Purpose: Measure cluster performance with moderate concurrency
# Variable: Streams (4)
# Fixed: Nodes=4, SF=50
# Systems: Exasol, ClickHouse, Trino, StarRocks (4 cluster-capable systems)
project_id: "ext_scalability_cluster_streams_4"
title: "Extended Scalability - Cluster Stream Scaling (4 Streams)"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 4

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "ext-scale-exa-cs4"
    clickhouse:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "ext-scale-ch-cs4"
    trino:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "ext-scale-trino-cs4"
    starrocks:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "ext-scale-sr-cs4"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  # Exasol - 4-node cluster (128GB total), 4 streams
  - name: "exasol"
    kind: "exasol"
    version: "2025.1.8"
    setup:
      method: "installer"
      node_count: 4
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 96000  # 24GB × 4 nodes = 96GB cluster memory
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  # ClickHouse - 4-node sharded cluster (128GB total), 4 streams
  - name: "clickhouse"
    kind: "clickhouse"
    version: "25.10.2.65"
    setup:
      method: "native"
      node_count: 4
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "24g"  # Per-node limit
        max_threads: "4"
        # 96GB total * 0.8 / 4 streams / 4 nodes = 4.8GB per query per node
        max_memory_usage: "4800000000"
        max_bytes_before_external_group_by: "2400000000"
        max_bytes_before_external_sort: "2400000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "1200000000"

  # Trino - 4-node cluster (128GB total), 4 streams
  - name: "trino"
    kind: "trino"
    version: "479"
    setup:
      method: "native"
      node_count: 4
      use_additional_disk: true
      host: "$TRINO_PUBLIC_IP"
      port: 8080
      username: "admin"
      catalog: "hive"
      schema: "tpch_views"
      storage:
        type: "s3"
        bucket: "benchkit-ext-scalability-trino-eu-west-1"
        region: "eu-west-1"
      extra:
        query_max_memory: "96GB"
        query_max_memory_per_node: "24GB"

  # StarRocks - 4-node cluster (128GB total), 4 streams
  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.4"
    setup:
      method: "native"
      node_count: 4
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 16  # 4 buckets per node
        replication_num: 1

workload:
  name: "tpch"
  scale_factor: 50
  runs_per_query: 5
  warmup_runs: 1
  data_format: "csv"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 4
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
