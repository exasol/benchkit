# Node Scaling - 4 Nodes (128GB total)
# Goal: Show performance with 4 nodes
project_id: "scalability_node_4"
title: "Node Scaling - 4 Nodes (128GB)"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 2

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "scalability-exa-node4"
    clickhouse:
      instance_type: "r6id.xlarge"  # 4 vCPUs, 32GB RAM per node
      disk:
        type: "local"
      label: "scalability-ch-node4"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "exasol"
    kind: "exasol"
    version: "2025.1.8"
    setup:
      method: "installer"
      node_count: 4  # 4-node cluster
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 96000  # 24GB × 4 nodes = 96GB cluster memory
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  - name: "clickhouse"
    kind: "clickhouse"
    version: "25.10.2.65"
    setup:
      method: "native"
      node_count: 4  # 4-node sharded cluster
      use_additional_disk: true
      data_dir: "/data/clickhouse"
      host: "$CLICKHOUSE_PUBLIC_IP"
      port: 8123
      username: "default"
      password: "clickhouse123"
      extra:
        memory_limit: "24g"  # Per-node limit
        max_threads: "4"
        # Total 96GB, ~5GB per query (96*0.8/5/4 nodes)
        max_memory_usage: "5000000000"
        max_bytes_before_external_group_by: "2500000000"
        max_bytes_before_external_sort: "2500000000"
        join_algorithm: "grace_hash"
        max_bytes_in_join: "1250000000"

workload:
  name: "tpch"
  scale_factor: 30
  runs_per_query: 5
  warmup_runs: 1
  data_format: "csv"
  generator: "dbgen"
  system_variants:
    clickhouse: "tuned"
  multiuser:
    enabled: true
    num_streams: 5
    randomize: true
    random_seed: 42

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
