project_id: "starrocks_exa_vs_sr_10g_mn"
title: "Exasol vs StarRocks: TPC-H SF10 (Multi-Node 3, Single-User)"
author: "Benchmark Team"

execution:
  parallel: true
  max_workers: 2

env:
  mode: "aws"
  region: "eu-west-1"
  allow_external_database_access: true
  instances:
    exasol:
      instance_type: "r6id.large"    # 2 vCPUs, 16GB RAM per node (48GB total)
      disk:
        type: "local"
      label: "starrocks-exa-10g-mn"
    starrocks:
      instance_type: "r6id.large"    # 2 vCPUs, 16GB RAM per node (48GB total)
      disk:
        type: "local"
      label: "starrocks-sr-10g-mn"
  os_image: "ubuntu-22.04"
  ssh_key_name: "ok-work3"
  ssh_private_key_path: "~/.ssh/ok-work3.pem"

systems:
  - name: "exasol"
    kind: "exasol"
    version: "2025.1.8"
    setup:
      method: "installer"
      node_count: 3
      use_additional_disk: true
      c4_version: "4.28.5"
      host_addrs: "$EXASOL_PRIVATE_IP"
      host_external_addrs: "$EXASOL_PUBLIC_IP"
      image_password: "exasol123"
      db_password: "exasol456"
      admin_password: "exasol789"
      license_file: "configs/exasol.license"
      db_mem_size: 36000             # ~12GB × 3 nodes
      extra:
        optimizer_mode: "analytical"
        db_params:
          - "-writeTouchInit=1"
          - "-cacheMonitorLimit=0"
          - "-maxOverallSlbUsageRatio=0.95"
          - "-useQueryCache=0"
          - "-query_log_timeout=0"
          - "-joinOrderMethod=0"
          - "-etlCheckCertsDefault=0"

  - name: "starrocks"
    kind: "starrocks"
    version: "4.0.4"
    setup:
      method: "native"
      node_count: 3
      use_additional_disk: true
      host: "$STARROCKS_PUBLIC_IP"
      port: 9030
      username: "root"
      password: ""
      extra:
        bucket_count: 12    # 4 buckets per node for even distribution (~833MB/bucket)
        replication_num: 1  # True distribution (not replication)

workload:
  name: "tpch"
  scale_factor: 10
  runs_per_query: 5
  warmup_runs: 1
  data_format: "csv"
  generator: "dbgen"

report:
  show_boxplots: true
  show_bar_chart: true
  show_heatmap: true
